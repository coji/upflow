# Symphony orchestrator host. Separate Fly app from upflow itself so it can
# auto-stop independently and so a misbehaving runner can't take the main
# app down. Deploy with:
#   flyctl deploy -c infra/symphony/fly.toml --dockerfile infra/symphony/Dockerfile

app = "upflow-symphony"
primary_region = "nrt"
kill_signal = "SIGTERM"
kill_timeout = "30s"

# Backstop for memory spikes during agent runs. takt was OOM-killed on a
# nested `pnpm install --silent` at ~745MB anon-rss with only 1GB RAM,
# so we both bumped memory below and added swap as a safety net for
# transient spikes (claude-code / codex / cursor-agent processes can
# briefly balloon during inference). Swap is free; the real change is
# the 2GB memory bump in [[vm]].
swap_size_mb = 1024

[build]
dockerfile = "Dockerfile"

# Anything required at app boot (validated by app/libs/dotenv.server.ts
# or used by db scripts) needs both an entry here AND a mirror in
# `infra/symphony/preflight-local.sh` `ENV_ARGS`. The local preflight
# check lives or dies by that mirror staying in sync.
#
# Secret-named vars (`*_SECRET`) live in `fly secrets` even when the
# value is only a dummy — keeping committed config free of any secret-
# patterned plaintext avoids normalising "edit fly.toml when you need a
# new credential" as a habit. See `docs/symphony-setup.md` for the
# `flyctl secrets set` command operators run once after first deploy.
[env]
HOME = "/data/home"
SYMPHONY_REPO_DIR = "/data/upflow"
PORT = "8080"
# Required by db/data-dir.ts (resolveDataDir). Both `pnpm db:setup` in
# the preflight and any takt-driven test that touches the DB read this.
# Volume-backed so DB state survives machine restarts; matches the
# symphony repo dir layout (`/data/upflow/...`).
UPFLOW_DATA_DIR = "/data/upflow/data"
# Non-secret stubs that satisfy app/libs/dotenv.server.ts schema
# validation. Symphony itself never makes outbound OAuth calls; these
# only exist so takt steps that import server modules (vitest, pnpm
# build, etc.) pass the env-var presence check.
BETTER_AUTH_URL = "http://localhost:8080"
GITHUB_CLIENT_ID = "symphony-dummy"

[[mounts]]
source = "symphony_data"
destination = "/data"

[[services]]
protocol = "tcp"
internal_port = 8080
# Frozen (2026-05-09): symphony は claude code の SSE silent hang
# (anthropics/claude-code#33949) と takt の 10 分 idle ハードコードの
# 組み合わせで安定運用が困難になり、一旦凍結。`auto_start_machines`
# を切ることで `gh workflow disable symphony-tick.yml` 後に万が一の
# 手動 /tick が来てもマシンが起動しない。再開時は true に戻して
# `fly deploy` + `gh workflow enable symphony-tick.yml`。
auto_stop_machines = "off"
auto_start_machines = false
min_machines_running = 0

[[services.ports]]
port = 80
handlers = ["http"]
force_https = true

[[services.ports]]
port = 443
handlers = ["tls", "http"]

[[vm]]
cpu_kind = "shared"
# Bumped from 1 vCPU to 4 vCPU after issue #399 cursor-coder traced to
# `react-router typegen` taking 2.6 min per invocation on shared-cpu-1x
# (cursor would retry typegen in test-fix loops, eating the 90-min budget).
# Memory bumped 2→4 GB because cursor + typegen + tsc + vitest can run
# concurrently during the implement step. Idle shutdown still keeps the
# real cost dominated by actual run time, not provisioned size.
cpus = 4
memory = "4gb"
