provider: claude
model: claude-opus-4-7

# Trial: auto_pr enabled with draft_pr so takt opens a draft PR after
# supervise. If auto-PR behavior is acceptable after a few runs, leave
# enabled; otherwise flip back. See issue #365.
auto_pr: true
draft_pr: true

# Persona routing (Claude Max 20x / Codex Plus / Cursor Pro):
#   - Requirements authoring → Codex gpt-5.5    (Claude leaks code into requirements docs)
#   - Review / acceptance / judgment → Claude Opus 4.7 (Max 20x absorbs the volume)
#   - Code edits → Cursor composer-2-fast
# Codex Plus is the thinnest pool; keep it on spec-author only (low volume, never parallel)
# to avoid the 2026-03-31 failure mode where parallel reviewers exhausted Codex quota.
persona_providers:
  coder:
    provider: cursor
    model: composer-2-fast
  spec-author:
    provider: codex
    model: gpt-5.5
  spec-reviser:
    provider: claude
    model: claude-opus-4-7
  architecture-reviewer:
    provider: codex
    model: gpt-5.5
  acceptor:
    provider: codex
    model: gpt-5.5
  simplifier:
    provider: claude
    model: claude-opus-4-7
  supervisor:
    provider: claude
    model: claude-opus-4-7

provider_profiles:
  cursor:
    default_permission_mode: full
  codex:
    default_permission_mode: full
  claude:
    default_permission_mode: full

# Pipeline mode (`takt --pipeline`) — used by CI for non-interactive runs.
# Templates only apply when --pipeline is set; regular `takt run` ignores them.
pipeline:
  default_branch_prefix: 'takt/'
  commit_message_template: '{title}'
  pr_body_template: |
    ## Summary

    {issue_body}

    ## Execution Report

    {report}

    Refs #{issue}
