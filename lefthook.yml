pre-commit:
  commands:
    format:
      glob: '*.{js,jsx,ts,tsx,mjs,cjs,json,jsonc,css,md,mdx,yml,yaml,html,toml}'
      run: pnpm exec vp fmt -c .oxfmtrc.json {staged_files} && git add {staged_files}
    lint:
      glob: '*.{js,jsx,ts,tsx,mjs,cjs}'
      run: pnpm exec vp lint -c .oxlintrc.json --fix {staged_files} && git add {staged_files}
