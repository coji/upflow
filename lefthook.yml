pre-commit:
  commands:
    format:
      glob: '*.{js,jsx,ts,tsx,mjs,cjs,json,css,md,yml,yaml,html}'
      run: npx prettier --cache --write {staged_files} && git add {staged_files}
    lint:
      glob: '*.{js,jsx,ts,tsx,mjs,cjs}'
      run: npx biome lint --write {staged_files} && git add {staged_files}
