name: 🎼 Symphony tick

# Hits the symphony Fly machine on a schedule. The first request of an idle
# period auto-starts the machine; the symphony server then either picks up
# one ready issue (long-running takt run) or returns idle and the machine
# self-shuts after its idle window.
#
# Frozen (2026-05-09): schedule trigger を外して凍結中。fly machine も
# `auto_start_machines = false` で起動しない。残してあるのは
# workflow_dispatch だけで、再開判断後に手動で叩いて動作確認できる。
# 復活手順:
#   1. infra/symphony/fly.toml の auto_start_machines を true に戻す
#   2. fly deploy -c infra/symphony/fly.toml --dockerfile infra/symphony/Dockerfile
#   3. gh workflow enable symphony-tick.yml
#   4. この yml の `schedule:` を復活させる

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: symphony-tick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: 🎼 POST /tick
        env:
          TICK_TOKEN: ${{ secrets.SYMPHONY_TICK_TOKEN }}
          SYMPHONY_URL: ${{ secrets.SYMPHONY_URL }}
        run: |
          if [ -z "$SYMPHONY_URL" ] || [ -z "$TICK_TOKEN" ]; then
            echo "::warning::SYMPHONY_URL or SYMPHONY_TICK_TOKEN not configured; skipping tick"
            exit 0
          fi
          # --max-time 5400s = 90 min budget per issue. Fly's HTTP edge
          # holds long requests as long as bytes flow; the symphony
          # server streams nothing until the takt run completes, so the
          # connection stays in a quiet wait state. If Fly's edge proxy
          # drops the request before takt finishes the symphony server
          # still completes the run and posts the GitHub comment from
          # inside the machine.
          #
          # Retry on cold-boot races: when the machine is stopped, the
          # first /tick triggers Fly's auto_start_machines but image pull
          # + container init + pnpm install can take 60-90s. Fly's edge
          # times out at ~50s and returns 502, so without retries the
          # very first cron tick of an idle period silently no-ops.
          # curl's default `--retry` already treats 5xx (incl. 500/502)
          # as transient, which is exactly the cold-boot signal we need
          # to retry on; no `--retry-all-errors` (that flag would also
          # retry 4xx like an auth failure, which we don't want).
          #
          # A 500 from `handleTick` itself (e.g. GitHub API failure
          # while transitioning labels) gets retried too, which can mask
          # the failure on the second attempt if the issue is left in
          # the `symphony:running` state. The boot-time orphan check
          # in `bin/symphony-serve.ts` (`reconcileOrphans`) catches this
          # on the next cold start and marks such issues `failed`, so
          # the worst-case visibility loss is one cron cycle.
          curl --fail-with-body \
               --max-time 5400 \
               --retry 5 \
               --retry-delay 30 \
               -sS \
               -X POST \
               -H "Authorization: Bearer ${TICK_TOKEN}" \
               -H 'Content-Type: application/json' \
               "${SYMPHONY_URL%/}/tick"
